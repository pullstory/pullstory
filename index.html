<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>끌당북스 · PULL STORY</title>
  <meta name="description" content="이미 이룬 사람의 강의가 아닙니다. 지금 시도하는 한 사람의 일기입니다. 매일 자기 인생을 한 페이지씩 써내려가는 환경, 끌당북스." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="끌당북스 · PULL STORY" />
  <meta property="og:description" content="이미 이룬 사람의 강의가 아닙니다. 지금 시도하는 한 사람의 일기입니다." />
  <meta property="og:url" content="https://pullstory.net" />
  <meta name="theme-color" content="#f5ecd9" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Nanum+Pen+Script&family=Noto+Serif+KR:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --paper:    #f5ecd9;
      --paper-lt: #fffdf5;
      --ink:      #3a2818;
      --ink-soft: #6b4f30;
      --gold:     #d4a851;
      --gold-dk:  #9c7a2a;
      --line:     rgba(58, 40, 24, 0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      font-family: "Noto Serif KR", serif;
      color: var(--ink);
      background-color: var(--paper);
      /* subtle paper grain */
      background-image:
        radial-gradient(circle at 20% 15%, rgba(212,168,81,0.07), transparent 45%),
        radial-gradient(circle at 80% 85%, rgba(107,79,48,0.06), transparent 40%);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      line-height: 1.7;
    }

    .frame {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 7vh 1.5rem 4vh;
      position: relative;
    }

    /* thin inner border like a vintage book plate */
    .frame::before {
      content: "";
      position: absolute;
      inset: 1.4rem;
      border: 1px solid var(--line);
      pointer-events: none;
    }

    .week {
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      font-size: 0.8rem;
      color: var(--gold-dk);
      margin-bottom: 2.6rem;
    }
    .week::before, .week::after {
      content: "·";
      margin: 0 0.7em;
      color: var(--line);
    }

    .wordmark-en {
      font-family: "Cormorant Garamond", serif;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      font-size: 1rem;
      color: var(--ink-soft);
      margin-bottom: 0.4rem;
      padding-left: 0.42em; /* optical centering for letter-spacing */
    }

    .wordmark-kr {
      font-family: "Nanum Pen Script", cursive;
      font-size: clamp(3.4rem, 12vw, 5.6rem);
      line-height: 1;
      color: var(--ink);
      margin-bottom: 2.2rem;
    }

    .rule {
      width: 46px;
      height: 1px;
      background: var(--gold-dk);
      opacity: 0.7;
      margin: 0 auto 2.2rem;
    }

    .thesis {
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-size: clamp(1.15rem, 3.2vw, 1.5rem);
      color: var(--gold-dk);
      letter-spacing: 0.04em;
      margin-bottom: 1.6rem;
    }

    .tagline {
      max-width: 30rem;
      font-weight: 300;
      font-size: clamp(1rem, 2.6vw, 1.15rem);
      color: var(--ink);
      margin: 0 auto 2.4rem;
    }
    .tagline strong { font-weight: 600; }

    .note {
      max-width: 26rem;
      font-weight: 300;
      font-size: 0.92rem;
      color: var(--ink-soft);
      margin: 0 auto;
      opacity: 0.9;
    }

    /* footer */
    footer {
      text-align: center;
      padding: 1.6rem 1.5rem 2rem;
      font-family: "Cormorant Garamond", serif;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
      opacity: 0.7;
    }
    footer .reader {
      font-family: "Nanum Pen Script", cursive;
      text-transform: none;
      letter-spacing: 0;
      font-size: 1.25rem;
      opacity: 1;
      display: block;
      margin-bottom: 0.8rem;
      color: var(--ink);
    }

    /* gentle fade-in */
    .fade { opacity: 0; transform: translateY(10px); animation: rise 1.1s ease forwards; }
    .fade.d1 { animation-delay: 0.1s; }
    .fade.d2 { animation-delay: 0.35s; }
    .fade.d3 { animation-delay: 0.6s; }
    .fade.d4 { animation-delay: 0.85s; }
    .fade.d5 { animation-delay: 1.1s; }
    @keyframes rise { to { opacity: 1; transform: translateY(0); } }
    @media (prefers-reduced-motion: reduce) {
      .fade { animation: none; opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <main class="frame">
    <p class="week fade d1">Week 01</p>

    <p class="wordmark-en fade d2">Pull Story</p>
    <h1 class="wordmark-kr fade d2">끌당북스</h1>

    <div class="rule fade d3"></div>

    <p class="thesis fade d3">끌어당김 &nbsp;=&nbsp; 스토리</p>

    <p class="tagline fade d4">
      이미 이룬 사람의 강의가 아닙니다.<br />
      지금 시도하는 한 사람의 <strong>일기</strong>입니다.
    </p>

    <p class="note fade d5">
      매일 자기 인생을 한 페이지씩 써내려가는 환경.<br />
      지금 0에서 시작합니다. 이 사이트는 매주 한 페이지씩 자랍니다.
    </p>
  </main>

  <footer class="fade d5">
    <span class="reader">당신은 독자인가요, 작가인가요?</span>
    Pull Story · 2026 · The First Page
  </footer>
</body>
</html>
