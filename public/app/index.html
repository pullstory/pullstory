// 책 표지 페이지 (캐러셀 안에서 보여지는 표지) — 읽기 전용
// 제목/표지 이미지는 '미래' 페이지에서 설정
// ═════════════════════════════════════════════════════════════════════
function CoverPage({data, setData}) {
  return (
    <div style={{
      height:"100%",
      background:data.bookCover ? `url(${data.bookCover}) center/cover` : "linear-gradient(135deg,#8a6730 0%,#5a3f1c 50%,#3a2818 100%)",
      borderRadius:"6px",
      padding:"40px 28px",
      display:"flex", flexDirection:"column", justifyContent:"space-between",
      position:"relative",
      overflow:"hidden",
      border:"1px solid #6a5538",
      boxShadow:"inset 0 0 60px rgba(0,0,0,.35)"
    }}>
      <div style={{position:"absolute",inset:"12px",border:"1px solid rgba(212,168,81,.45)",borderRadius:"6px",pointerEvents:"none"}}/>
      <div style={{position:"absolute",inset:"16px",border:"1px solid rgba(212,168,81,.18)",borderRadius:"4px",pointerEvents:"none"}}/>
      {data.bookCover && <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg,rgba(0,0,0,.5) 0%,rgba(0,0,0,.2) 50%,rgba(0,0,0,.65) 100%)",pointerEvents:"none"}}/>}

      <div style={{textAlign:"center",position:"relative",zIndex:1}}>
        <div className="heading-latin" style={{fontSize:"11px",color:"rgba(212,168,81,.7)",letterSpacing:"4px",fontWeight:700}}>STORY · CASH · BOOK</div>
        <div style={{margin:"18px auto",width:"40px",height:"1px",background:"rgba(212,168,81,.5)"}}/>
        <div style={{minHeight:"60px"}}>
          <div className="heading-serif" style={{fontSize:"22px",color:"#f5ecd9",lineHeight:1.4,fontWeight:700,textShadow:"0 2px 8px rgba(0,0,0,.5)"}}>
            {data.bookTitle || <span style={{color:"#d4a85188",fontStyle:"italic",fontSize:"13px",lineHeight:1.6,display:"block"}}>『미래』 페이지에서<br/>제목과 표지를 정하세요</span>}
          </div>
        </div>
        <div style={{margin:"18px auto 0",width:"24px",height:"1px",background:"rgba(212,168,81,.4)"}}/>
      </div>

      <div style={{textAlign:"center",position:"relative",zIndex:1}}>
        <div className="heading-latin" style={{fontSize:"10px",color:"rgba(212,168,81,.6)",letterSpacing:"3px"}}>끌당 출판사</div>
      </div>
    </div>
  );
}

// 위계: 현재(출발점) ⊂ 에피소드(일) ⊂ 챕터(월) ⊂ 클라이맥스(연) ⊂ 미래(인생 책)

  {key:"workshop", label:"Notes",     title:"Notes",     sub:"노트"},
  {key:"now",      label:"Scrapbook", title:"Scrapbook", sub:"스크랩북"},
  {key:"writing",  label:"Page",      title:"Page",      sub:"오늘의 페이지"},
  {key:"chapters", label:"Books",     title:"Books",     sub:"이달의 책"},
  {key:"climax",   label:"Shelf",     title:"Shelf",     sub:"올해의 책장"},
  {key:"future",   label:"Vision",    title:"Vision",    sub:"비전보드"},
  {key:"cover",    label:"Door",      title:"Door",      sub:"입구"}
];

// 하단 네비 아이콘 (currentColor 상속 → 활성/비활성 색 자동)
function NavIcon({k, size=23}) {
  const paths = {
    workshop: <g><path d="M3 21l3.6-1L20 6.6 17.4 4 4 17.4 3 21z"/><path d="M14.4 6.6l3 3"/></g>,
    now:      <g><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="6.5" y="6.5" width="6" height="6" rx="1"/><path d="M14 16.5l-3-3-4.5 4.5"/></g>,
    writing:  <g><path d="M7 3h6.5L18 7.5V21H7z"/><path d="M13.5 3v4.5H18"/><path d="M10 12.5h5M10 16h5"/></g>,
    chapters: <g><rect x="5" y="5" width="14" height="3.6" rx="1"/><rect x="5" y="10.2" width="14" height="3.6" rx="1"/><rect x="5" y="15.4" width="14" height="3.6" rx="1"/></g>,
    climax:   <g><path d="M4 20.5h16"/><rect x="6" y="8" width="3" height="12.5"/><rect x="10.5" y="5" width="3" height="15.5"/><rect x="15" y="10.5" width="3" height="10"/></g>,
    future:   <path d="M12 3.5l2.5 5.3 5.8.8-4.2 4 1 5.9L12 17.7 6.9 20.5l1-5.9-4.2-4 5.8-.8L12 3.5z"/>,

         strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" style={{display:"block",margin:"0 auto"}}>
      {paths[k] || null}

// ═════════════════════════════════════════════════════════════════════
// 작업실(노트) 페이지 — 노트 작성/발행 (Firestore 'notes' 컬렉션)
// 각 노트: {ownerUid, title, body, visibility:'public'|'private', createdAt}
// ═════════════════════════════════════════════════════════════════════
function WorkshopPage({user}) {
  const uid = user && user.uid;
  const cloud = FIREBASE_READY && fbDb && uid && uid !== "local-user";
  const [notes, setNotes] = useState([]);
  const [editing, setEditing] = useState(null); // {id?, title, body, visibility}
  const [ready, setReady] = useState(false);
  const linkBtn = {background:"none",border:"none",padding:0,cursor:"pointer",fontSize:"12px",color:"#9c7a2a",textDecoration:"underline"};

  useEffect(() => {
    if (!cloud) { setReady(true); return; }
    const unsub = fbDb.collection("notes").where("ownerUid","==",uid)
      .onSnapshot(snap => {
        const arr = [];
        snap.forEach(d => arr.push({id:d.id, ...d.data()}));
        arr.sort((a,b) => (((b.createdAt&&b.createdAt.seconds)||9e15) - ((a.createdAt&&a.createdAt.seconds)||9e15)));
        setNotes(arr); setReady(true);
      }, err => { console.warn("notes load:", err); setReady(true); });
    return () => unsub();
  }, [cloud, uid]);

  const startNew = () => setEditing({title:"", body:"", visibility:"private"});
  const startEdit = (n) => setEditing({id:n.id, title:n.title||"", body:n.body||"", visibility:n.visibility||"private"});

  const save = async () => {
    const t = (editing.title||"").trim(), b = (editing.body||"").trim();
    if (!t && !b) { setEditing(null); return; }
    const now = firebase.firestore.FieldValue.serverTimestamp();
    try {
      if (editing.id) {
        await fbDb.collection("notes").doc(editing.id).update({title:t, body:b, visibility:editing.visibility, updatedAt:now});
      } else {
        await fbDb.collection("notes").add({ownerUid:uid, title:t, body:b, visibility:editing.visibility, createdAt:now, updatedAt:now});
      }
      setEditing(null);
    } catch(e) { alert("저장 실패: "+e.message); }
  };
  const remove = async (n) => {
    if (!confirm("이 노트를 삭제할까요?")) return;
    try { await fbDb.collection("notes").doc(n.id).delete(); } catch(e){ alert("삭제 실패: "+e.message); }
  };
  const toggleVis = async (n) => {
    const v = n.visibility==="public" ? "private" : "public";
    try { await fbDb.collection("notes").doc(n.id).update({visibility:v}); } catch(e){ alert("실패: "+e.message); }
  };

  if (!cloud) {
    return (
      <div style={{textAlign:"center",padding:"40px 10px",color:"#6b4f30"}}>
        <div className="heading-serif" style={{fontSize:"18px",color:"#3a2818",fontWeight:700,marginBottom:"10px"}}>작업실</div>
        <p style={{fontSize:"13px",lineHeight:1.7}}>노트를 쓰고 발행하려면<br/>Google 로그인이 필요해요.</p>
      </div>
    );
  }

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px"}}>
        <div>
          <div className="heading-serif" style={{fontSize:"20px",color:"#3a2818",fontWeight:700}}>작업실</div>
          <div style={{fontSize:"11px",color:"#9c7a2a"}}>노트를 써서 나의 책을 채워요</div>
        </div>
        {!editing && <button className="btn-gold" onClick={startNew}>+ 새 노트</button>}
      </div>

      {editing && (
        <div style={{background:"rgba(255,253,245,.6)",border:"1px solid #d8c79a",borderRadius:"8px",padding:"12px",marginBottom:"16px"}}>
          <input className="input" style={{marginBottom:"8px",fontWeight:700}} placeholder="제목"
            value={editing.title} onChange={e=>setEditing({...editing,title:e.target.value})}/>
          <textarea className="input" rows={8} style={{marginBottom:"8px",resize:"vertical",fontFamily:"'Noto Serif KR',serif",lineHeight:1.7}} placeholder="본문을 써보세요…"
            value={editing.body} onChange={e=>setEditing({...editing,body:e.target.value})}/>
          <div style={{display:"flex",gap:"8px",marginBottom:"10px"}}>
            {["private","public"].map(v=>(
              <button key={v} onClick={()=>setEditing({...editing,visibility:v})} style={{
                flex:1,padding:"8px",borderRadius:"6px",cursor:"pointer",fontSize:"12px",fontWeight:700,
                border:"1px solid "+(editing.visibility===v?"#b8862f":"#d8c79a"),
                background:editing.visibility===v?"rgba(212,168,81,.18)":"transparent",
                color:editing.visibility===v?"#9c7a2a":"#b89066"
              }}>{v==="private"?"🔒 나만 보기":"🌐 공개"}</button>
            ))}
          </div>
          <div style={{display:"flex",gap:"8px"}}>
            <button className="btn-gold" style={{flex:1}} onClick={save}>저장</button>
            <button onClick={()=>setEditing(null)} style={{flex:1,padding:"10px",borderRadius:"8px",border:"1px solid #d8c79a",background:"transparent",color:"#9c7a2a",cursor:"pointer",fontWeight:700}}>취소</button>
          </div>
        </div>
      )}

      {!ready ? (
        <div style={{textAlign:"center",color:"#b89066",fontSize:"12px",padding:"20px"}}>불러오는 중…</div>
      ) : notes.length===0 && !editing ? (
        <div style={{textAlign:"center",color:"#b89066",fontSize:"13px",padding:"30px 10px",lineHeight:1.7}}>아직 노트가 없어요.<br/>『+ 새 노트』로 첫 글을 써보세요.</div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
          {notes.map(n=>(
            <div key={n.id} style={{background:"rgba(255,253,245,.5)",border:"1px solid #e0d3ad",borderRadius:"8px",padding:"12px"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"4px",gap:"8px"}}>
                <div className="heading-serif" style={{fontSize:"15px",color:"#3a2818",fontWeight:700}}>{n.title||"(제목 없음)"}</div>
                <span style={{fontSize:"10px",fontWeight:700,padding:"2px 7px",borderRadius:"20px",whiteSpace:"nowrap",
                  background:n.visibility==="public"?"rgba(90,140,74,.15)":"rgba(107,79,48,.12)",
                  color:n.visibility==="public"?"#4a7a3a":"#8a6630"}}>{n.visibility==="public"?"공개":"나만"}</span>
              </div>
              {n.body && <div style={{fontSize:"12px",color:"#6b4f30",lineHeight:1.6,whiteSpace:"pre-wrap",maxHeight:"3.2em",overflow:"hidden"}}>{n.body}</div>}
              <div style={{display:"flex",gap:"14px",marginTop:"8px"}}>
                <button onClick={()=>toggleVis(n)} style={linkBtn}>{n.visibility==="public"?"비공개로":"공개로"}</button>
                <button onClick={()=>startEdit(n)} style={linkBtn}>편집</button>
                <button onClick={()=>remove(n)} style={{...linkBtn,color:"#b85450"}}>삭제</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function PageBook({data, setData, onLogout, user}) {
  const [pageIdx, setPageIdx] = useState(() => PAGES.findIndex(p=>p.key==="future"));  // 시작: 미래
  const [menu, setMenu] = useState(false);
  const [dragDx, setDragDx] = useState(0);
  const [isDragging, setIsDragging] = useState(false);
  const dragRef = useRef({active:false, x:0, y:0, moved:false});

  const goPrev = useCallback(() => setPageIdx(i => Math.max(0, i-1)), []);
  const goNext = useCallback(() => setPageIdx(i => Math.min(PAGES.length-1, i+1)), []);

  // 터치 스와이프 (모바일)
  const onTouchStart = e => {
    dragRef.current = {active:true, x:e.touches[0].clientX, y:e.touches[0].clientY, moved:false};
  };
  const onTouchEnd = e => {
    const t = e.changedTouches[0];
    const dx = t.clientX - dragRef.current.x;
    const dy = t.clientY - dragRef.current.y;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)*1.2) {
      if (dx < 0) goNext(); else goPrev();
    }
    dragRef.current.active = false;
  };

  // 마우스 드래그 (PC)
  const onMouseDown = (e) => {
    // 입력 요소나 버튼 클릭은 드래그로 인식하지 않음
    if (e.target.closest('input,textarea,button,select,a,label,img')) return;
    if (e.button !== 0) return;
    e.preventDefault();
    dragRef.current = {active:true, x:e.clientX, y:e.clientY, moved:false};
    setIsDragging(true);
    setDragDx(0);
  };

  useEffect(() => {
    const onMove = (e) => {
      if (!dragRef.current.active) return;
      const dx = e.clientX - dragRef.current.x;
      if (Math.abs(dx) > 5) dragRef.current.moved = true;
      // 드래그 프리뷰 (양 끝에서는 저항)
      setDragDx(dx * 0.5);
    };
    const onUp = (e) => {
      if (!dragRef.current.active) return;
      dragRef.current.active = false;
      const dx = (e.clientX !== undefined ? e.clientX : dragRef.current.x) - dragRef.current.x;
      const threshold = Math.min(80, window.innerWidth * 0.18);
      if (Math.abs(dx) > threshold) {
        if (dx < 0) goNext(); else goPrev();
      }
      setIsDragging(false);
      setDragDx(0);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
  }, [goPrev, goNext]);

  // 키보드 화살표 지원
  useEffect(() => {
    const onKey = e => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
      if (e.key === "ArrowLeft") goPrev();
      else if (e.key === "ArrowRight") goNext();
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [goPrev, goNext]);

  const renderPage = (key) => {
    switch(key) {
      case "cover":    return <CoverPage    data={data} setData={setData}/>;
      case "future":   return <FuturePage   data={data} setData={setData}/>;
      case "climax":   return <GoalsPage    data={data} setData={setData}/>;
      case "chapters": return <HomePage     data={data} setData={setData}/>;
      case "writing":  return <EpisodePage  data={data} setData={setData}/>;
      case "now":      return <HistoryPage  data={data} setData={setData}/>;
      case "workshop": return <WorkshopPage user={user}/>;
      default: return null;
    }
  };

  const cur = PAGES[pageIdx];
  // 하단 네비: 표지(마지막 idx) 제외 → 현재 · 에피소드 · 챕터 · 클라이맥스 · 미래
  const menuPages = PAGES.slice(0, PAGES.length-1);
  const isCover = cur.key === "cover";
  const isFirst = pageIdx === 0;
  const isLast = pageIdx === PAGES.length-1;

  return (
    <div style={{height:"100%",background:"linear-gradient(180deg,#3a2c1e,#1a0f08)",position:"relative",overflow:"hidden",userSelect:isDragging?"none":"auto",cursor:isDragging?"grabbing":"auto"}}
         onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}
         onMouseDown={onMouseDown}>

      {/* Top bar */}
      <div style={{position:"absolute",top:0,left:0,right:0,height:"52px",background:"linear-gradient(180deg,rgba(0,0,0,.5),transparent)",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 14px",zIndex:10,paddingTop:"max(8px,env(safe-area-inset-top))"}}>
        <button onClick={()=>setMenu(true)} style={{background:"rgba(0,0,0,.4)",border:"1px solid rgba(212,168,81,.3)",color:"#d4a851",borderRadius:"6px",padding:"6px 12px",fontSize:"12px",cursor:"pointer"}}>☰</button>
        <div style={{textAlign:"center",pointerEvents:"none"}}>
          {cur.sub && <div className="heading-latin" style={{fontSize:"10px",color:"#d4a85188",letterSpacing:"2px"}}>{cur.sub}</div>}
          <div className="heading-serif" style={{fontSize:"14px",color:"#d4a851",fontWeight:700,marginTop:"-1px"}}>{cur.title}</div>
        </div>
        <div style={{fontSize:"11px",color:"#d4a85199",fontWeight:700}} className="heading-latin">{data.pageCount||0}p</div>
      </div>

      {/* Pages carousel */}
      <div style={{position:"absolute",top:"52px",bottom:"56px",left:0,right:0,display:"flex",transform:`translateX(calc(${-pageIdx*100}% + ${dragDx}px))`,transition:isDragging?"none":"transform .42s cubic-bezier(.4,.1,.3,1)",willChange:"transform"}}>
        {PAGES.map((p,i)=>(
          <div key={p.key} style={{minWidth:"100%",height:"100%",padding:"10px 10px"}}>
            {p.key === "cover" ? (
              <div style={{height:"100%",borderRadius:"6px",overflow:"hidden",boxShadow:"0 4px 14px rgba(0,0,0,.4)"}}>
                {Math.abs(i - pageIdx) <= 1 ? renderPage(p.key) : null}
              </div>
            ) : (
              <div className="paper paper-edge" style={{height:"100%",borderRadius:"6px",overflow:"hidden",position:"relative"}}>
                <div className="page-wrap" style={{height:"100%",overflow:"auto"}}>
                  <div style={{padding:"22px 18px"}}>
                    {Math.abs(i - pageIdx) <= 1 ? renderPage(p.key) : null}
                  </div>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Side arrows — 항상 표시 (PC 사용성) */}
      <button onClick={goPrev} disabled={isFirst} style={{
        position:"absolute",left:"4px",top:"50%",transform:"translateY(-50%)",
        background:"rgba(0,0,0,.5)",border:"1px solid rgba(212,168,81,.4)",borderRadius:"50%",
        width:"26px",height:"26px",color:isFirst?"#5a4828":"#d4a851",
        cursor:isFirst?"not-allowed":"pointer",fontSize:"15px",zIndex:5,
        display:"flex",alignItems:"center",justifyContent:"center",
        opacity:isFirst?.3:.85,transition:"opacity .2s,transform .15s",
        fontFamily:"serif",lineHeight:1,paddingBottom:"2px",
        boxShadow:isFirst?"none":"0 1px 4px rgba(0,0,0,.3)"
      }}>‹</button>
      <button onClick={goNext} disabled={isLast} style={{
        position:"absolute",right:"4px",top:"50%",transform:"translateY(-50%)",
        background:"rgba(0,0,0,.5)",border:"1px solid rgba(212,168,81,.4)",borderRadius:"50%",
        width:"26px",height:"26px",color:isLast?"#5a4828":"#d4a851",
        cursor:isLast?"not-allowed":"pointer",fontSize:"15px",zIndex:5,
        display:"flex",alignItems:"center",justifyContent:"center",
        opacity:isLast?.3:.85,transition:"opacity .2s,transform .15s",
        fontFamily:"serif",lineHeight:1,paddingBottom:"2px",
        boxShadow:isLast?"none":"0 1px 4px rgba(0,0,0,.3)"
      }}>›</button>

      {/* Bottom navigation — 표지 제외 + RTL 순서: 현재 · 에피소드 · 챕터 · 클라이맥스 · 미래 */}
      <div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(0deg,rgba(0,0,0,.7),transparent)",padding:"8px 8px",paddingBottom:"max(8px,env(safe-area-inset-bottom))",zIndex:10}}>
        <div style={{display:"flex",justifyContent:"space-around",gap:"4px"}}>
          {menuPages.map((p)=>{
            const idx = PAGES.findIndex(x=>x.key===p.key);
            const active = idx===pageIdx;
            return (
              <button key={p.key} onClick={()=>setPageIdx(idx)} style={{
                flex:1,
                padding:"8px 4px",
                background:active?"rgba(212,168,81,.2)":"transparent",
                border:"none",
                borderRadius:"8px",
                borderTop:active?"2px solid #d4a851":"2px solid transparent",
                color:active?"#d4a851":"#8a7556",
                cursor:"pointer",
                transition:"all .2s",
                fontFamily:"'Noto Sans KR',sans-serif",
                display:"flex",alignItems:"center",justifyContent:"center"
              }} title={p.title}>
                <NavIcon k={p.key}/>
              </button>
            );
          })}
        </div>
      </div>

      {/* Menu overlay (햄버거) — 메뉴는 RTL 순서로 표시 */}
      {menu && (
        <div onClick={()=>setMenu(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",zIndex:50,display:"flex",alignItems:"flex-start",justifyContent:"flex-start",animation:"fadeIn .2s"}}>
          <div onClick={e=>e.stopPropagation()} style={{width:"260px",height:"100%",background:"linear-gradient(180deg,#3a2c1e,#1a0f08)",padding:"20px",paddingTop:"max(20px,env(safe-area-inset-top))",borderRight:"1px solid #6a5538",overflow:"auto"}}>
            <div style={{textAlign:"center",marginBottom:"20px",paddingBottom:"16px",borderBottom:"1px solid #4a3520"}}>
              <div className="heading-latin" style={{fontSize:"22px",color:"#d4a851",fontWeight:700,letterSpacing:"2px"}}>Scash Book</div>
              <div style={{fontSize:"11px",color:"#9c7a2a",marginTop:"4px"}}>{user?.name||"작가"}님</div>
              {data.bookTitle && <div className="heading-script" style={{fontSize:"15px",color:"#b8924a",marginTop:"6px"}}>『{data.bookTitle}』</div>}
            </div>
            <div style={{padding:"10px",background:"rgba(212,168,81,.1)",borderRadius:"8px",marginBottom:"14px",textAlign:"center"}}>
              <div className="heading-latin" style={{fontSize:"32px",color:"#d4a851",fontWeight:700,lineHeight:1}}>{data.pageCount||0}<span style={{fontSize:"14px"}}>p</span></div>
              <div style={{fontSize:"10px",color:"#9c7a2a",marginTop:"4px"}}>지금까지 쓴 페이지</div>

                  background:active?"rgba(212,168,81,.15)":"transparent",
                  border:"1px solid "+(active?"#d4a85155":"transparent"),
                  borderRadius:"6px",color:active?"#d4a851":"#b8924a",

            <div style={{marginTop:"20px",paddingTop:"16px",borderTop:"1px solid #4a3520"}}>
              <a href="/shelf/" style={{display:"block",width:"100%",boxSizing:"border-box",textAlign:"center",padding:"10px",marginBottom:"8px",background:"rgba(212,168,81,.12)",border:"1px solid #6a5538",color:"#d4a851",borderRadius:"6px",textDecoration:"none",fontSize:"12px"}}>← 내 책장</a>
              <a href="/" style={{display:"block",width:"100%",boxSizing:"border-box",textAlign:"center",padding:"10px",marginBottom:"14px",background:"transparent",border:"1px solid #6a5538",color:"#b8924a",borderRadius:"6px",textDecoration:"none",fontSize:"12px"}}>PULLSTORY 홈</a>
              <button onClick={onLogout} style={{width:"100%",padding:"10px",background:"transparent",border:"1px solid #6a5538",color:"#9c7a2a",borderRadius:"6px",cursor:"pointer",fontSize:"12px"}}>로그아웃</button>
              <div style={{textAlign:"center",fontSize:"9px",color:"#6a5538",marginTop:"14px",letterSpacing:"1px"}}>끌당 출판사 · © 2026</div>
              {!FIREBASE_READY && <div style={{textAlign:"center",fontSize:"9px",color:"#8a6630",marginTop:"4px",opacity:.6}}>로컬 모드</div>}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════
// 메인 앱
// ═════════════════════════════════════════════════════════════════════
function App() {
  const [user, setUser] = useState(null);
  const [data, setDataState] = useState(null);
  const [opened, setOpened] = useState(false);
  const [loading, setLoading] = useState(true);

  // 초기화: 기존 세션 확인
  useEffect(() => {
    const initLocal = () => {
      const localUser = localStorage.getItem(LS_AUTH);
      if (localUser) {
        try {
          const u = JSON.parse(localUser);
          setUser(u);
          const d = loadLocal() || {...defaultData(), startDate:todayStr()};
          setDataState(d);
        } catch(e) {}
      }
      setLoading(false);
    };

    if (FIREBASE_READY) {
      const unsub = fbAuth.onAuthStateChanged(async (fbUser) => {
        if (fbUser) {
          const u = {uid:fbUser.uid, name:fbUser.displayName||"작가"};
          setUser(u);
          const remote = await loadRemote(fbUser.uid);
          const d = remote || loadLocal() || {...defaultData(), startDate:todayStr()};
          setDataState(d);
          setLoading(false);
        } else {
          // Check for local session as fallback
          initLocal();
        }
      });
      return () => unsub && unsub();
    } else {
      initLocal();
    }
  }, []);

  const setData = useCallback((d) => {
    setDataState(d);
    if (user) scheduleSave(user.uid, d);
  }, [user]);

  const handleLogin = (u) => {
    setUser(u);
    const d = loadLocal() || {...defaultData(), startDate:todayStr()};
    setDataState(d);
    setOpened(false);
  };

  const handleLogout = async () => {
    if (!confirm("로그아웃 하시겠습니까?\n(데이터는 다음 로그인 시 복원됩니다)")) return;
    if (FIREBASE_READY && fbAuth.currentUser) {
      try { await fbAuth.signOut(); } catch(e) {}
    }
    localStorage.removeItem(LS_AUTH);
    setUser(null);
    setDataState(null);
    setOpened(false);
  };

  if (loading) {
    return (
      <div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center",background:"#1a0f08",color:"#d4a851",fontSize:"12px",letterSpacing:"2px",animation:"pulse 1.2s infinite"}}>
        Loading...
      </div>
    );
  }

  if (!user) return <LoginScreen onLogin={handleLogin}/>;
  if (!data) return <div style={{height:"100%",background:"#1a0f08"}}/>;

  if (!opened) {
    return (
      <BookCover
        data={data}
        onStart={()=>setOpened(true)}
      />
    );
  }

  return <PageBook data={data} setData={setData} onLogout={handleLogout} user={user}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(()=>{});
    });
  }
</script>
</body>
</html>
